services:
  - type: web
    name: playground
    runtime: node
    buildCommand: npm ci && cd apps/notifications/frontend && npm ci && npm run build && cd ../../flashcard/frontend && npm ci && npm run build
    startCommand: node server/index.js
    envVars:
      - key: DB_PATH
        value: /data/notifications.db
      - key: FLASHCARD_DB_PATH
        value: /data/flashcards.db
      - key: DISCORD_CHANNEL_ID
        value: "1505966182954700913"
      - key: DISCORD_BOT_TOKEN
        sync: false
    disk:
      name: notification-data
      mountPath: /data
      sizeGB: 1
