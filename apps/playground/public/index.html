<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f5f7;
        --fg: #1a1a1a;
        --card-bg: #ffffff;
        --card-border: #e2e2e6;
        --accent: #5b5bd6;
        --muted: #6b6b76;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121214;
          --fg: #f0f0f2;
          --card-bg: #1c1c20;
          --card-border: #2c2c32;
          --accent: #8b8bf5;
          --muted: #9a9aa5;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 2rem;
      }
      h1 {
        font-size: 2.25rem;
        margin: 0;
        letter-spacing: -0.02em;
      }
      p.subtitle {
        margin: 0;
        color: var(--muted);
        text-align: center;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1.25rem;
        width: 100%;
        max-width: 720px;
      }
      a.card {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        padding: 1.5rem;
        border-radius: 16px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        text-decoration: none;
        color: inherit;
        transition: transform 0.15s ease, border-color 0.15s ease;
      }
      a.card:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
      }
      .card .icon { font-size: 2rem; }
      .card .name {
        font-size: 1.1rem;
        font-weight: 600;
      }
      .card .desc {
        font-size: 0.9rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Playground</h1>
      <p class="subtitle">Pick something to open.</p>
    </div>
    <div class="cards">
      <a class="card" href="/notifications">
        <span class="icon">🔔</span>
        <span class="name">Notifications</span>
        <span class="desc">Schedule push notifications to Discord</span>
      </a>
      <a class="card" href="/flashcard">
        <span class="icon">🗂️</span>
        <span class="name">Flashcards</span>
        <span class="desc">Decks, spaced repetition, quiz mode</span>
      </a>
    </div>
  </body>
</html>
